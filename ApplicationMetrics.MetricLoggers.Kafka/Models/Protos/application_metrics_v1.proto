syntax = "proto3";

option csharp_namespace = "ApplicationMetrics.MetricLoggers.Kafka.Grpc.GeneratedCode.V1";

import "google/protobuf/timestamp.proto";

message MetricInstance {
	string type_full_name = 1;
	string category = 2;
	string name = 3;
	string description = 4;
	google.protobuf.Timestamp event_time = 5;
}

message CountMetricInstance {
	MetricInstance base_properties = 1;
}

message AmountMetricInstance {
	MetricInstance base_properties = 1;
	int64 amount = 2;
}

message StatusMetricInstance {
	MetricInstance base_properties = 1;
	int64 value = 2;
}

message IntervalMetricInstance {
	MetricInstance base_properties = 1;
	int64 duration = 2;
}

message MetricInstanceListItem {
	oneof item {
		CountMetricInstance count_metric_instance = 1;
		AmountMetricInstance amount_metric_instance = 2;
		StatusMetricInstance  status_metric_instance = 3;
		IntervalMetricInstance interval_metric_instance = 4;
	}
}